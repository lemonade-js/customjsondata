[manifest]
version = "1"
dump_lua = true
priority = 36210

[[patches]]
[patches.pattern]
target = "obj/OptionsList.lua"
pattern = '''love.graphics.print(v.text,x,y)'''
position = "at"
payload = '''
if v.disabled then color(2) end
love.graphics.print(v.text,x,y)
if v.disabled then color(1) end
'''
match_indent = true

[[patches]]
[patches.pattern]
target = "states/SongSelect.lua"
pattern = '''local playFunc = function ()
	if not self.menuItems[self.selection].invalidLevel then
		if self.menuItems[self.selection].isLevel then
'''
position = "after"
payload = '''
local _item = self.menuItems[self.selection]

local skip = false
if not skip and not _item.properties.customData then skip = true end
if not skip and not _item.properties.customData.variants then skip = true end
if not skip and not _item.properties.customData.variants[_item.currVariant] then skip = true end
if not skip and not _item.properties.customData.variants[_item.currVariant].requirements then skip = true end
if not skip and type(_item.properties.customData.variants[_item.currVariant].requirements) ~= "table" then skip = true end

if not skip then
    local missing = {}

    for _, requirement in ipairs(_item.properties.customData.variants[_item.currVariant].requirements) do
        if not mods[requirement] or not mods[requirement].enabled then table.insert(missing, requirement) end
    end

    if #missing > 0 then
        PopupManager.queuePopup('Warning', 'The following required mods are missing:\n\n' .. table.concat(missing, "\n"), 60, {
            {label='popupOK'}
        })
        return
    end
end
'''
match_indent = true